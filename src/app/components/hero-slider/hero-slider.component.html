<section class="hero-slider">
  <ul class="slides" [style.transform]="'translateX(-' + current * 100 + '%)'">
    @for (slide of slides; track slide.title; let i = $index) {
      <li class="slide" [class.active]="i === current">
        <a class="slide-link" [routerLink]="slide.link">
          <img class="slide-image" [src]="slide.image" [alt]="slide.alt" [attr.loading]="i === 0 ? 'eager' : 'lazy'" />
          <div class="slide-description">
            <div class="container">
              <p class="h1">{{ slide.title }}</p>
              <p class="h2">{{ slide.subtitle }}</p>
              <p class="h3">{{ slide.text }}</p>
              <p class="slide-buttons">
                <span class="btn-primary">Profiter</span>
                <span class="btn-secondary-outline">Voir la sélection</span>
              </p>
            </div>
          </div>
        </a>
        <div class="slide-social">
          <a class="social-link" [href]="social.tiktok" target="_blank" aria-label="TikTok">
            <svg width="15" height="15" viewBox="0 0 24 24" role="img" xmlns="http://www.w3.org/2000/svg">

                fill="#000000" />
            </svg>
          </a>
        </div>
      </li>
    }
  </ul>
  <button class="slider-arrow next" type="button" aria-label="Suivant" (click)="next()">
    <svg width="14" height="24" viewBox="0 0 14 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2L12 12L2 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
  <button class="slider-arrow prev" type="button" aria-label="Précédent" (click)="prev()">
    <svg width="14" height="24" viewBox="0 0 14 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L2 12L12 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>
</section>
