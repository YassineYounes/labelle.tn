<article class="product-miniature">
  <div class="thumbnail-container">
    <div class="thumbnail-images">
      <a class="product-thumbnail" [routerLink]="product().link">
        <img [src]="product().image" [alt]="product().name" loading="lazy" width="560" height="560" />
      </a>
      @if (!product().inStock) {
        <ul class="product-flags">
          <li class="product-flag out-of-stock">Rupture de stock</li>
        </ul>
      }
      <div class="add-to-cart-block">
        <div class="action-icon" [class.wish-active]="wishlist.has(product().id)"
          title="Ajouter à ma liste de souhaits" (click)="toggleWishlist()">
          <svg width="22" height="22" viewBox="0 0 25 25"
            [attr.fill]="wishlist.has(product().id) ? 'rgb(219, 150, 161)' : 'none'"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M24.125 7.65625C24.125 4.44646 21.4138 1.84375 18.0697 1.84375C15.5703 1.84375 13.4235 3.29817 12.5 5.37387C11.5765 3.29817 9.42971 1.84375 6.92904 1.84375C3.5875 1.84375 0.875 4.44646 0.875 7.65625C0.875 16.9821 12.5 23.1562 12.5 23.1562C12.5 23.1562 24.125 16.9821 24.125 7.65625Z"
              [attr.stroke]="wishlist.has(product().id) ? 'rgb(219, 150, 161)' : '#3A3A3A'" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>

          </svg>
        </div>
      </div>
    </div>
    <div class="thumbnail-bottom">
      <div class="product-description">
        <h3 class="product-title">
          <a [routerLink]="product().link">{{ product().cardName }}</a>
        </h3>
        <div class="product-bottom-row">
          <div class="product-price-and-shipping">
            <span class="price">{{ product().price }}</span>
          </div>
          <a class="comments-note" href="#">
            <div class="star-content">
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
            </div>
            <span>0 avis(s)</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</article>
