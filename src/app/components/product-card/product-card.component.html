<article class="product-miniature">
  <div class="thumbnail-container">
    <div class="thumbnail-images">
      <a class="product-thumbnail" [routerLink]="product().link">
        <img [src]="product().image" [alt]="product().name" loading="lazy" width="560" height="560" />
      </a>
      <ul class="product-flags">
        @if (product().oldPrice) {
          <li class="product-flag promo">Promo</li>
        }
        @if (!product().inStock) {
          <li class="product-flag out-of-stock">Rupture de stock</li>
        }
      </ul>
      <div class="add-to-cart-block">
        <div class="action-icon" [class.wish-active]="wishlist.has(product().id)"
          title="Ajouter à ma liste de souhaits" (click)="toggleWishlist()">
          <svg width="22" height="22" viewBox="0 0 25 25"
            [attr.fill]="wishlist.has(product().id) ? 'rgb(219, 150, 161)' : 'none'"
            xmlns="http://www.w3.org/2000/svg">
            <path
              d="M24.125 7.65625C24.125 4.44646 21.4138 1.84375 18.0697 1.84375C15.5703 1.84375 13.4235 3.29817 12.5 5.37387C11.5765 3.29817 9.42971 1.84375 6.92904 1.84375C3.5875 1.84375 0.875 4.44646 0.875 7.65625C0.875 16.9821 12.5 23.1562 12.5 23.1562C12.5 23.1562 24.125 16.9821 24.125 7.65625Z"
              [attr.stroke]="wishlist.has(product().id) ? 'rgb(219, 150, 161)' : '#3A3A3A'" stroke-width="1.7"
              stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="action-icon" title="Aperçu rapide" (click)="quickView.open(product())">
          <svg width="22" height="22" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M3.6748 15.2148L0.452148 11.9492C0.308919 11.806 0.237305 11.6341 0.237305 11.4336C0.237305 11.2044 0.308919 11.0182 0.452148 10.875L3.84668 7.52344C3.98991 7.35156 4.16178 7.26562 4.3623 7.26562C4.59147 7.26562 4.79199 7.35156 4.96387 7.52344C5.1071 7.66667 5.17871 7.85286 5.17871 8.08203C5.17871 8.28255 5.1071 8.45443 4.96387 8.59766L2.90137 10.6602H10.4639V3.09766L8.4873 5.07422C8.34408 5.21745 8.15788 5.28906 7.92871 5.28906C7.72819 5.28906 7.54199 5.21745 7.37012 5.07422C7.22689 4.93099 7.15527 4.75911 7.15527 4.55859C7.15527 4.32943 7.22689 4.12891 7.37012 3.95703L10.6787 0.648438C10.8219 0.505208 11.0081 0.433594 11.2373 0.433594C11.4378 0.433594 11.624 0.505208 11.7959 0.648438L15.1904 4.08594C15.3623 4.22917 15.4482 4.41536 15.4482 4.64453C15.4482 4.8737 15.3623 5.0599 15.1904 5.20312C15.0472 5.34635 14.8753 5.41797 14.6748 5.41797C14.4456 5.41797 14.2594 5.34635 14.1162 5.20312L12.0107 3.09766V10.6602H19.5732L17.7686 8.85547C17.6253 8.71224 17.5537 8.54036 17.5537 8.33984C17.5537 8.11068 17.6253 7.92448 17.7686 7.78125C17.9118 7.60938 18.0837 7.52344 18.2842 7.52344C18.5133 7.52344 18.7139 7.60938 18.8857 7.78125L22.0225 10.918C22.1657 11.0612 22.2373 11.2331 22.2373 11.4336C22.2373 11.6628 22.1657 11.849 22.0225 11.9922L18.7139 15.3008C18.5706 15.444 18.3844 15.5156 18.1553 15.5156C17.9548 15.5156 17.7686 15.444 17.5967 15.3008C17.4535 15.1289 17.3818 14.9427 17.3818 14.7422C17.3818 14.513 17.4535 14.3268 17.5967 14.1836L19.5732 12.207H12.0107V19.7695L13.9443 17.8359C14.0876 17.6641 14.2594 17.5781 14.46 17.5781C14.6891 17.5781 14.8896 17.6641 15.0615 17.8359C15.2048 17.9792 15.2764 18.1654 15.2764 18.3945C15.2764 18.5951 15.2048 18.7669 15.0615 18.9102L11.7529 22.2188C11.6097 22.362 11.4378 22.4336 11.2373 22.4336C11.0081 22.4336 10.8219 22.362 10.6787 22.2188L7.37012 18.8672C7.19824 18.724 7.1123 18.5521 7.1123 18.3516C7.1123 18.1224 7.19824 17.9219 7.37012 17.75C7.51335 17.6068 7.68522 17.5352 7.88574 17.5352C8.11491 17.5352 8.30111 17.6068 8.44434 17.75L10.4639 19.7695V12.207H2.90137L4.79199 14.0977C4.93522 14.2695 5.00684 14.4701 5.00684 14.6992C5.00684 14.8997 4.93522 15.0716 4.79199 15.2148C4.64876 15.3867 4.46257 15.4727 4.2334 15.4727C4.03288 15.4727 3.84668 15.3867 3.6748 15.2148Z"
              fill="#3a3a3a" />
          </svg>
        </div>
      </div>
    </div>
    <div class="thumbnail-bottom">
      <div class="product-description">
        <h3 class="product-title">
          <a [routerLink]="product().link">{{ product().cardName }}</a>
        </h3>

        @if (showRating()) {
          <a class="comments-note" href="#">
            <div class="star-content">
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
              <div class="star"></div>
            </div>
            <span>0 avis(s)</span>
          </a>
        }

        <div class="product-price-row">
          @if (product().oldPrice) {
            <span class="price-old">{{ product().oldPrice }}</span>
          }
          <span class="price" [class.price-promo]="product().oldPrice">{{ product().price }}</span>
        </div>

        <button type="button" class="card-add-btn" [disabled]="!product().inStock" (click)="addToCart()">
          <svg width="16" height="16" viewBox="0 0 23 27" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M16.0311 11.6875V6.25C16.0311 5.04824 15.5537 3.8957 14.7039 3.04592C13.8541 2.19615 12.7016 1.71875 11.4998 1.71875C10.2981 1.71875 9.14553 2.19615 8.29575 3.04592C7.44598 3.8957 6.96858 5.04824 6.96858 6.25V11.6875M20.6904 9.27929L22.2165 23.7793C22.3011 24.5828 21.6728 25.2813 20.8644 25.2813H2.13525C1.94458 25.2815 1.756 25.2415 1.58177 25.1641C1.40753 25.0867 1.25153 24.9735 1.1239 24.8318C0.996268 24.6902 0.899863 24.5233 0.840945 24.3419C0.782027 24.1606 0.761914 23.9689 0.781913 23.7793L2.30925 9.27929C2.34448 8.94526 2.50213 8.6361 2.7518 8.41141C3.00147 8.18673 3.32549 8.06244 3.66137 8.0625H19.3383C20.0343 8.0625 20.6179 8.58813 20.6904 9.27929Z"
              stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          {{ product().inStock ? 'Ajouter au panier' : 'Indisponible' }}
        </button>
      </div>
    </div>
  </div>
</article>
