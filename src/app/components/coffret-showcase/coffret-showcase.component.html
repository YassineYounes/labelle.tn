@if (bundles().length > 0) {
  <section class="coffret-showcase">
    <div class="slider-head">
      <h2 class="slider-title">Nos Coffrets</h2>
      <div class="slider-controls">
        <a class="slider-seeall" routerLink="/coffret">Voir tout</a>
        <button type="button" class="slider-arrow" (click)="scroll(-1)" aria-label="Précédent">
          <svg width="9" height="14" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 1L1.5 6L6.5 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
        <button type="button" class="slider-arrow" (click)="scroll(1)" aria-label="Suivant">
          <svg width="9" height="14" viewBox="0 0 8 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 1L6.5 6L1.5 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>

    <div class="coffret-track" #track>
      @for (b of bundles(); track b.id) {
        <article class="coffret-card">
          <a class="coffret-image" [routerLink]="['/coffret-detail', b.slug]">
            <img [src]="b.cover" [alt]="b.name" loading="lazy" />
            @if (b.itemCount > 0) {
              <span class="coffret-badge">{{ b.itemCount }} produits</span>
            }
            @if (!b.inStock) {
              <span class="coffret-oos-badge">Rupture de stock</span>
            }
          </a>
          <div class="coffret-body">
            <h3 class="coffret-name">
              <a [routerLink]="['/coffret-detail', b.slug]">{{ b.name }}</a>
            </h3>
            <p class="coffret-price">{{ b.priceLabel }}</p>
            <button type="button" class="coffret-add" (click)="addBundle(b)" [disabled]="!b.inStock">
              <svg width="16" height="18" viewBox="0 0 23 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M16.0311 11.6875V6.25C16.0311 5.04824 15.5537 3.8957 14.7039 3.04592C13.8541 2.19615 12.7016 1.71875 11.4998 1.71875C10.2981 1.71875 9.14553 2.19615 8.29575 3.04592C7.44598 3.8957 6.96858 5.04824 6.96858 6.25V11.6875M20.6904 9.27929L22.2165 23.7793C22.3011 24.5828 21.6728 25.2813 20.8644 25.2813H2.13525C1.94458 25.2815 1.756 25.2415 1.58177 25.1641C1.40753 25.0867 1.25153 24.9735 1.1239 24.8318C0.996268 24.6902 0.899863 24.5233 0.840945 24.3419C0.782027 24.1606 0.761914 23.9689 0.781913 23.7793L2.30925 9.27929C2.34448 8.94526 2.50213 8.6361 2.7518 8.41141C3.00147 8.18673 3.32549 8.06244 3.66137 8.0625H19.3383C20.0343 8.0625 20.6179 8.58813 20.6904 9.27929Z"
                  stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              Ajouter au panier
            </button>
          </div>
        </article>
      }
    </div>
  </section>
}
